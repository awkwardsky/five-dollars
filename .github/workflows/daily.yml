name: five dollars daily

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily automation
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          TRONGRID_API_KEY: ${{ secrets.TRONGRID_API_KEY }}
          TRONSCAN_API_KEY: ${{ secrets.TRONSCAN_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run run:daily

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: five-dollars-output
          path: |
            data/opportunities.sqlite
            digests/latest.md
            site/**
            logs/*.json

      - name: Commit generated outputs
        run: |
          git config user.name "five-dollars-bot"
          git config user.email "five-dollars-bot@users.noreply.github.com"
          git add data/opportunities.sqlite digests/latest.md site logs/*.json
          git diff --cached --quiet || git commit -m "Update daily opportunities and payment check"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
